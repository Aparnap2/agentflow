version: '3.8'

services:
  neo4j:
    image: neo4j:5.15
    container_name: agentflow-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/agentflow123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - ./graph.db:/data
    networks:
      - agentflow-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: agentflow-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./vector.db:/qdrant/storage
    networks:
      - agentflow-network

  redis:
    image: redis:7-alpine
    container_name: agentflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agentflow-network

networks:
  agentflow-network:
    driver: bridge

volumes:
  redis_data: